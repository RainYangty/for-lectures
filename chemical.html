<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整化学元素周期表</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border-color: #cbd5e1;
            
            /* 分类配色 */
            --nonmetal: #dcfce7;
            --alkali: #fee2e2;
            --alkaline: #ffedd5;
            --transition: #f1f5f9;
            --post-transition: #e0f2fe;
            --metalloid: #fef9c3;
            --noble: #f5f3ff;
            --halogen: #dcfce7;
            --lanthanide: #fae8ff;
            --actinide: #fce7f3;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #334155;
            letter-spacing: 12px;
            font-weight: bold;
        }

        .container {
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            max-width: 95vw;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: 45px repeat(18, 60px);
            gap: 3px;
        }

        .cell {
            aspect-ratio: 1 / 1.15;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.2s ease;
            cursor: default;
        }

        .cell:not(.label):hover {
            transform: scale(1.2);
            z-index: 50;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            border-color: #94a3b8;
        }

        .label {
            border: none;
            color: var(--text-dim);
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .period-label { font-size: 0.9rem; }
        .group-label { font-size: 0.75rem; padding-bottom: 8px; }

        .number { position: absolute; top: 2px; left: 4px; font-size: 0.65rem; color: #475569; }
        .symbol { font-size: 1.2rem; font-weight: bold; margin-top: 2px; }
        .name { font-size: 0.8rem; font-weight: 500; margin-top: -2px; }
        .weight { font-size: 0.55rem; color: #64748b; margin-top: 2px; transform: scale(0.9); }

        /* 分类背景类 */
        .nonmetal { background-color: var(--nonmetal); }
        .alkali { background-color: var(--alkali); }
        .alkaline { background-color: var(--alkaline); }
        .transition { background-color: var(--transition); }
        .post-transition { background-color: var(--post-transition); }
        .metalloid { background-color: var(--metalloid); }
        .noble { background-color: var(--noble); }
        .lanthanide { background-color: var(--lanthanide); }
        .actinide { background-color: var(--actinide); }

        .extra-section {
            margin-top: 45px;
            display: grid;
            grid-template-columns: 110px repeat(15, 60px);
            gap: 3px;
            margin-left: 45px; /* 对齐主表 */
        }

        .extra-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid var(--border-color);
            background: #f1f5f9;
        }

        .legend {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            font-size: 0.8rem;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border: 1px solid #cbd5e1; }
    </style>
</head>
