<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学节九宫格挑战 | π的征程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #3c1053);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        header {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(100, 255, 218, 0.7);
            color: #fff;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #3a7bd5, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }
        
        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #64ffda;
            text-align: center;
        }
        
        .math-symbols {
            font-size: 2.5rem;
            letter-spacing: 15px;
            margin: 15px 0;
            color: #ff7e5f;
            text-align: center;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }
        
        .game-ui {
            background: rgba(10, 25, 47, 0.85);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            border: 3px solid #64ffda;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }
        
        .game-title {
            text-align: center;
            font-size: 1.8rem;
            color: #64ffda;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(100, 255, 218, 0.3);
            padding-bottom: 15px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }
        
        .stat {
            text-align: center;
            background: rgba(30, 61, 104, 0.7);
            padding: 15px;
            border-radius: 12px;
            min-width: 120px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff9a8b;
        }
        
        .stat-label {
            font-size: 1rem;
            color: #88d3ce;
            margin-top: 5px;
        }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            margin: 0 auto 25px;
            width: min(90vw, 380px);
            height: min(90vw, 380px);
            background: rgba(100, 255, 218, 0.1);
            border: 2px solid #64ffda;
            border-radius: 10px;
            padding: 15px;
        }
        
        .cell {
            background: rgba(20, 45, 80, 0.8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .cell:hover {
            background: rgba(100, 255, 218, 0.2);
            transform: translateY(-5px);
        }
        
        .cell.x {
            color: #ff7e5f;
            text-shadow: 0 0 15px rgba(255, 126, 95, 0.7);
        }
        
        .cell.o {
            color: #64ffda;
            text-shadow: 0 0 15px rgba(100, 255, 218, 0.7);
        }
        
        .winning-cell {
            animation: winPulse 1.5s infinite;
        }
        
        @keyframes winPulse {
            0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 13px 35px;
            background: linear-gradient(to right, #00b09b, #96c93d);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 20px rgba(0, 0, 0, 0.4);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .btn-reset {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
        }
        
        .btn-new-game {
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }
        
        .status {
            text-align: center;
            font-size: 1.6rem;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-text {
            padding: 15px 30px;
            background: rgba(30, 61, 104, 0.8);
            border-radius: 50px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { text-shadow: 0 0 5px rgba(100, 255, 218, 0.5); }
            50% { text-shadow: 0 0 20px rgba(100, 255, 218, 0.9); }
            100% { text-shadow: 0 0 5px rgba(100, 255, 218, 0.5); }
        }
        
        .player-turn {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            gap: 40px;
        }
        
        .player {
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(30, 61, 104, 0.5);
            transition: all 0.3s;
            position: relative;
            min-width: 150px;
            text-align: center;
        }
        
        .player.active {
            transform: scale(1.05);
            background: rgba(100, 255, 218, 0.2);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.4);
        }
        
        .player-x .marker {
            color: #ff7e5f;
        }
        
        .player-o .marker {
            color: #64ffda;
        }
        
        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 10px;
        }
        
        .mode-btn {
            padding: 10px 25px;
            background: rgba(47, 85, 151, 0.5);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: #64ffda;
            color: #1a2a6c;
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.5);
        }
        
        .marker {
            font-size: 1.5rem;
            margin-right: 8px;
        }
        
        footer {
            margin-top: 40px;
            text-align: center;
            padding: 20px;
            color: #88d3ce;
            font-size: 1rem;
            width: 100%;
            max-width: 1000px;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f00;
            animation: fall 5s linear forwards;
            z-index: 100;
        }
        
        @keyframes fall {
            to {
              transform: translate3d(0, 100vh, 0) rotate(360deg);
            }
        }
        
        .winner-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        
        .winner-banner.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .winner-text {
            font-size: 4rem;
            color: gold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .play-again-btn {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 126, 95, 0.7);
            animation: pulseLarge 1.5s infinite;
        }
        
        @keyframes pulseLarge {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }
            
            .status {
                font-size: 1.3rem;
            }
            
            .cell {
                font-size: 3.2rem;
            }
            
            .game-ui {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>数学节九宫格挑战</h1>
        <p class="subtitle">策略与智慧的数学对决 | π的征程</p>
        <div class="math-symbols">X O π</div>
    </header>
    
    <div class="container">
        <div class="game-ui">
            <div class="game-title">九宫格挑战赛</div>
            
            <div class="status">
                <div class="status-text" id="gameStatus">玩家X回合</div>
            </div>
            
            <div class="player-turn">
                <div class="player player-x" id="playerX">
                    <span class="marker">X</span> 玩家X
                </div>
                <div class="player player-o" id="playerO">
                    <span class="marker">O</span> 玩家O
                </div>
            </div>
            
            <div id="game-board">
                <div class="cell" data-cell-index="0"></div>
                <div class="cell" data-cell-index="1"></div>
                <div class="cell" data-cell-index="2"></div>
                <div class="cell" data-cell-index="3"></div>
                <div class="cell" data-cell-index="4"></div>
                <div class="cell" data-cell-index="5"></div>
                <div class="cell" data-cell-index="6"></div>
                <div class="cell" data-cell-index="7"></div>
                <div class="cell" data-cell-index="8"></div>
            </div>
            
            <div class="mode-toggle">
                <button class="mode-btn" id="modePvp">玩家 vs 玩家</button>
                <button class="mode-btn" id="modePve">玩家 vs 电脑</button>
            </div>
            
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="xWins">0</div>
                    <div class="stat-label">X 胜利次数</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="draws">0</div>
                    <div class="stat-label">平局次数</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="oWins">0</div>
                    <div class="stat-label">O 胜利次数</div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-reset" id="resetBtn">重置本轮</button>
                <button class="btn btn-new-game" id="newGameBtn">全新游戏</button>
            </div>
        </div>
        
        <div class="winner-banner" id="winnerBanner">
            <div class="winner-text" id="winnerText">玩家X获胜!</div>
            <button class="play-again-btn" id="playAgainBtn">再玩一次</button>
        </div>
    </div>
    
    <footer>
        <p>© 2023 国际数学节 | 九宫格策略挑战 | 基于经典井字棋游戏</p>
        <p>锻炼空间思维与数学模型能力 | 数学节特别活动</p>
    </footer>
    
    <script>
        // 游戏状态
        const gameState = {
            board: ['', '', '', '', '', '', '', '', ''],
            currentPlayer: 'X',
            gameActive: true,
            mode: 'pvp', // 'pvp' 或 'pve'
            status: '玩家X回合',
            xWins: 0,
            oWins: 0,
            draws: 0,
            winningCombinations: [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // 行
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // 列
                [0, 4, 8], [2, 4, 6]             // 对角线
            ]
        };
        
        // DOM 元素
        const cells = document.querySelectorAll('.cell');
        const gameStatus = document.getElementById('gameStatus');
        const xWinsElement = document.getElementById('xWins');
        const oWinsElement = document.getElementById('oWins');
        const drawsElement = document.getElementById('draws');
        const resetBtn = document.getElementById('resetBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const playerX = document.getElementById('playerX');
        const playerO = document.getElementById('playerO');
        const modePvp = document.getElementById('modePvp');
        const modePve = document.getElementById('modePve');
        const winnerBanner = document.getElementById('winnerBanner');
        const winnerText = document.getElementById('winnerText');
        const playAgainBtn = document.getElementById('playAgainBtn');
        
        // 初始化游戏
        function initializeGame() {
            // 重置棋盘
            gameState.board = ['', '', '', '', '', '', '', '', ''];
            gameState.gameActive = true;
            gameState.currentPlayer = 'X';
            
            // 更新UI
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o', 'winning-cell');
            });
            
            updateStatus();
            updatePlayerIndicators();
            winnerBanner.classList.remove('show');
        }
        
        // 切换玩家
        function changePlayer() {
            gameState.currentPlayer = gameState.currentPlayer === 'X' ? 'O' : 'X';
            updateStatus();
            updatePlayerIndicators();
            
            // 如果是AI回合且游戏还在进行中
            if (gameState.mode === 'pve' && gameState.currentPlayer === 'O' && gameState.gameActive) {
                setTimeout(makeAIMove, 600); // 延迟执行AI移动
            }
        }
        
        // 检查游戏结果
        function checkGameResult() {
            let roundWon = false;
            
            // 检查所有获胜组合
            for (let i = 0; i < gameState.winningCombinations.length; i++) {
                const [a, b, c] = gameState.winningCombinations[i];
                if (gameState.board[a] && 
                    gameState.board[a] === gameState.board[b] && 
                    gameState.board[a] === gameState.board[c]) {
                    
                    roundWon = true;
                    
                    // 高亮显示获胜组合
                    highlightWinningCells([a, b, c]);
                    break;
                }
            }
            
            // 如果有胜利者
            if (roundWon) {
                const winner = gameState.currentPlayer === 'X' ? '玩家X' : '玩家O';
                gameState.status = `${winner} 获胜!`;
                gameState.gameActive = false;
                
                // 更新胜利计数
                if (gameState.currentPlayer === 'X') {
                    gameState.xWins++;
                } else {
                    gameState.oWins++;
                }
                
                // 显示胜利横幅
                winnerText.textContent = gameState.status;
                setTimeout(() => {
                    winnerBanner.classList.add('show');
                    createConfetti();
                }, 500);
                
                return;
            }
            
            // 检查平局
            if (!gameState.board.includes('')) {
                gameState.status = "游戏平局!";
                gameState.gameActive = false;
                gameState.draws++;
                winnerText.textContent = "平局!";
                setTimeout(() => {
                    winnerBanner.classList.add('show');
                }, 500);
                return;
            }
            
            // 没有结果，继续游戏
            changePlayer();
        }
        
        // 高亮显示获胜的格子
        function highlightWinningCells(cellIndexes) {
            cellIndexes.forEach(index => {
                cells[index].classList.add('winning-cell');
            });
        }
        
        // 更新游戏状态显示
        function updateStatus() {
            gameStatus.textContent = gameState.status;
        }
        
        // 更新玩家指示器
        function updatePlayerIndicators() {
            playerX.classList.toggle('active', gameState.currentPlayer === 'X');
            playerO.classList.toggle('active', gameState.currentPlayer === 'O');
            
            if (gameState.currentPlayer === 'X') {
                gameState.status = '玩家X回合';
            } else {
                gameState.status = gameState.mode === 'pvp' ? '玩家O回合' : '电脑思考中...';
            }
            
            updateStatus();
        }
        
        // 更新统计数据
        function updateStats() {
            xWinsElement.textContent = gameState.xWins;
            oWinsElement.textContent = gameState.oWins;
            drawsElement.textContent = gameState.draws;
        }
        
        // 玩家移动
        function handleCellClick(event) {
            const cell = event.target;
            const cellIndex = parseInt(cell.getAttribute('data-cell-index'));
            
            // 确保单元格为空且游戏正在进行中
            if (gameState.board[cellIndex] !== '' || !gameState.gameActive) {
                return;
            }
            
            // 设置单元格的玩家标记
            gameState.board[cellIndex] = gameState.currentPlayer;
            cell.textContent = gameState.currentPlayer;
            cell.classList.add(gameState.currentPlayer);
            
            // 检查游戏结果
            checkGameResult();
            updateStats();
        }
        
        // AI移动逻辑
        function makeAIMove() {
            if (!gameState.gameActive) return;
            
            // 尝试寻找获胜移动
            for (let i = 0; i < gameState.winningCombinations.length; i++) {
                const [a, b, c] = gameState.winningCombinations[i];
                if ([gameState.board[a], gameState.board[b], gameState.board[c]]
                    .filter(mark => mark === 'O').length === 2) {
                    
                    const emptyCell = [a, b, c].find(index => gameState.board[index] === '');
                    if (emptyCell !== undefined) {
                        makeMove(emptyCell);
                        return;
                    }
                }
            }
            
            // 尝试阻塞玩家的获胜移动
            for (let i = 0; i < gameState.winningCombinations.length; i++) {
                const [a, b, c] = gameState.winningCombinations[i];
                if ([gameState.board[a], gameState.board[b], gameState.board[c]]
                    .filter(mark => mark === 'X').length === 2) {
                    
                    const emptyCell = [a, b, c].find(index => gameState.board[index] === '');
                    if (emptyCell !== undefined) {
                        makeMove(emptyCell);
                        return;
                    }
                }
            }
            
            // 优先占据中心位置
            if (gameState.board[4] === '') {
                makeMove(4);
                return;
            }
            
            // 选择随机空位
            const emptyCells = gameState.board
                .map((value, index) => value === '' ? index : null)
                .filter(index => index !== null);
                
            if (emptyCells.length > 0) {
                const randomIndex = Math.floor(Math.random() * emptyCells.length);
                makeMove(emptyCells[randomIndex]);
            }
        }
        
        // AI执行的移动
        function makeMove(cellIndex) {
            const cell = document.querySelector(`.cell[data-cell-index="${cellIndex}"]`);
            gameState.board[cellIndex] = 'O';
            cell.textContent = 'O';
            cell.classList.add('o');
            
            // 检查游戏结果
            checkGameResult();
            updateStats();
        }
        
        // 创建五彩纸屑效果
        function createConfetti() {
            const colors = ['#ff9a8b', '#64ffda', '#4facfe', '#f3f9a6', '#ff416c'];
            const container = document.querySelector('.container');
            
            for (let i = 0; i < 120; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = `${Math.random() * 3 + 2}s`;
                
                container.appendChild(confetti);
                
                setTimeout(() => {
                    if (confetti.parentNode) {
                        confetti.parentNode.removeChild(confetti);
                    }
                }, 5000);
            }
        }
        
        // 事件监听器
        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        
        resetBtn.addEventListener('click', initializeGame);
        
        newGameBtn.addEventListener('click', function() {
            gameState.xWins = 0;
            gameState.oWins = 0;
            gameState.draws = 0;
            initializeGame();
            updateStats();
        });
        
        playAgainBtn.addEventListener('click', initializeGame);
        
        modePvp.addEventListener('click', function() {
            gameState.mode = 'pvp';
            modePvp.classList.add('active');
            modePve.classList.remove('active');
            initializeGame();
        });
        
        modePve.addEventListener('click', function() {
            gameState.mode = 'pve';
            modePvp.classList.remove('active');
            modePve.classList.add('active');
            initializeGame();
        });
        
        // 初始化游戏
        initializeGame();
        modePvp.classList.add('active');
        updateStats();
    </script>
</body>
</html>
